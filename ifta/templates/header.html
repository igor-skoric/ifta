{% load static %}

<header class="mb-5 bg-white shadow-md">
  <div class=" mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Levo: logo + tekst -->
      <div class="flex items-center space-x-2">
        <span class="font-bold text-xl text-gray-800">IFTA</span>
      </div>

      <!-- Desno: meni -->
      <nav class="flex space-x-6">
        <a href="{% url 'home' %}" class="text-gray-700 hover:text-blue-600">Home</a>
        <a href="{% url 'vehicle-mpg' %}" class="text-gray-700 hover:text-blue-600">MGP</a>
        <a href="{% url 'upload' %}" class="text-gray-700 hover:text-blue-600">Upload Files</a>
        <a href="{% url 'report' %}" class="text-gray-700 hover:text-blue-600">Miles & Fuel Report</a>
        {% if request.user.is_authenticated and request.user.is_staff and request.user.is_superuser %}
        <a href="{% url 'admin:index' %}" class="text-gray-700 hover:text-blue-600"><i class="fa-solid fa-user"></i></a>
        {% endif %}
        {% if request.user.is_authenticated %}
        <a href="{% url 'signout' %}" class="text-gray-700 hover:text-blue-600"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        {% endif %}
      </nav>

    </div>
  </div>
</header>
