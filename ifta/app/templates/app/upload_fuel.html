{% extends "base.html" %}

{% block title %}Upload{% endblock %}

{% load static %}

{% block content %}


<div class="flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-md bg-white shadow-md rounded-lg p-8">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Upload IFTA Fuel</h1>

    <form method="post" enctype="multipart/form-data" class="flex flex-col space-y-4">
      {% csrf_token %}

      <label class="block text-gray-700 font-medium">
        Select Excel files
        <input type="file" name="file" multiple
               class="mt-2 w-full text-gray-700 border border-gray-300 rounded-lg px-3 py-2
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                      file:border-0 file:bg-blue-50 file:text-blue-700 file:font-semibold
                      file:py-2 file:px-4 file:rounded-lg cursor-pointer">
      </label>

      <button type="submit"
              class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg
                     hover:bg-blue-700 transition duration-200">
        Upload
      </button>
    </form>

    <div class="text-center mt-6">
      <a href="{% url 'report-miles' %}"
         class="text-blue-600 font-medium hover:underline">
        View all IFTA records
      </a>
    </div>
  </div>
</div>



{% endblock %}
