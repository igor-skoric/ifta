{% extends "base.html" %}

{% block content %}
<div class="h-screen w-screen bg-[#0F0F1A] flex flex-col overflow-hidden">

    <!-- ===================== -->
    <!-- WEEKLY CARDS (TOP) -->
    <!-- ===================== -->


    <!-- ===================== -->
    <!-- TABLE (BOTTOM) -->
    <!-- ===================== -->

    <div class="flex-1 px-4 pb-6 overflow-hidden">
        <div class="flex justify-between">
            <h1 class="my-1 text-sm font-semibold text-gray-50">Company Drivers</h1>
            <div>
                <span id="total-profit-loss" class="text-sm font-bold text-gray-50 pr-50"> </span>
            </div>
        </div>
        <div class="h-full bg-white rounded-lg shadow-lg overflow-hidden flex flex-col">
            <!-- TABLE BODY (SCROLL AREA) -->
            <div id="scrollContainer" class="flex-1 overflow-hidden relative">
                <table class="w-full border-collapse">
                    <thead class="bg-gray-100 sticky top-0 z-20">
                        <tr id="headerRow"></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

        </div>
    </div>
    <div id="weekly-container" class="flex gap-3 px-4 py-2 overflow-x-auto "></div>
</div>

<script>
    /* ============================
       CONSTANTS & HELPERS
    ============================ */
    const DAY_ORDER = {
        Mon: 1, Tue: 2, Wed: 3, Thu: 4,
        Fri: 5, Sat: 6, Sun: 7, TOTALS: 99
    };

    const columnTitles = {
        "driver": "DRIVER",
        "dispatch": "DISPATCH",
        "profit_loss": "PROFIT / LOSS",
        "miles": "MILES",
        "avg": "AVG RPM",
        "gross": "GROSS",
        "cut": "CUT",
        "salary": "SALARY",
        "truck": "TRUCK",
        "mpg": "MPG",
        "idle_time": "IDLE TIME",
        "idle_percent": "IDLE %",
    };

    const totalProfitLoss = document.getElementById('total-profit-loss');

    function parseDollar(v) {
        return parseFloat(String(v).replace(/[$,]/g, '')) || 0;
    }

    /* ============================
       TABLE DATA
    ============================ */
    async function updateTableData() {
        let profitLossTotal = 0
        const res = await fetch('/api/statistic/weekly-driver-data/');
        const data = await res.json();
        profitLossTotal = Number(data.total_profit_loss);

        totalProfitLoss.innerHTML =
            "Total Profit / Loss ($): " +
            profitLossTotal.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            
        totalProfitLoss.classList.add(
            profitLossTotal < 0 ? 'text-red-500' : 'text-green-500'
        );

        if (!data.data.length) return;

        const columns = Object.keys(data.data[0]);
        const headerRow = document.getElementById('headerRow');
        const tbody = document.getElementById('tbody');

        headerRow.innerHTML = '';
        tbody.innerHTML = '';

        columns.forEach(col => {
            const th = document.createElement('th');
            th.className = "px-1 py-1 text-left text-xs font-semibold";
            th.textContent = columnTitles[col] || col;
            headerRow.appendChild(th);

        });

        data.data.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = "odd:bg-white even:bg-gray-50";

            columns.forEach(col => {
                const td = document.createElement('td');
                td.className = "p-1 text-xs whitespace-nowrap";
                td.textContent = row[col];

                if (col === 'profit_loss') {
                    td.classList.add(
                        parseDollar(row[col]) < 0 ? 'bg-red-300' : 'bg-green-300'
                    );
                    td.classList.add(
                        parseDollar(row[col]) < 0 ? 'font-bold' : 'font-bold'
                    );

                }
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    /* ============================
       AUTO SCROLL (TV MODE)
    ============================ */
    let scrollPos = 0;
    let dir = 1;
    const speed = 0.35;
    const pause = 2500;
    let paused = false;

    function autoScroll() {
        const container = document.getElementById('scrollContainer');
        const maxScroll = container.scrollHeight - container.clientHeight;

        if (!paused) {
            scrollPos += speed * dir;
            container.scrollTop = scrollPos;

            if (scrollPos >= maxScroll) {
                scrollPos = maxScroll;
                dir = -1;
                paused = true;
                setTimeout(() => paused = false, pause);
            }

            if (scrollPos <= 0) {
                scrollPos = 0;
                dir = 1;
                paused = true;
                setTimeout(() => paused = false, pause);
            }
        }

        requestAnimationFrame(autoScroll);
    }

    /* ============================
       WEEKLY CARDS
    ============================ */
    async function loadWeeklyStatistics() {
        const res = await fetch('/api/statistic/weekly-statistic/');
        const data = await res.json();

        data.sort((a, b) => DAY_ORDER[a.day] - DAY_ORDER[b.day]);

        const container = document.getElementById('weekly-container');
        container.innerHTML = '';

        data.forEach(item => {
            const totals = item.day === 'TOTALS';

            // Background boje
            const cardBg = totals ? '#5B7CFA' : '#330A56'; // totals - svetliji akcenat, ostalo - brand color
            const cardShadow = totals ? 'shadow-xl' : 'shadow-lg';

            const card = document.createElement('div');
            card.style.backgroundColor = cardBg;
            card.className = `rounded-lg p-2 text-white ${cardShadow} flex flex-col transition-transform duration-300 ${totals ? 'scale-105' : ''}`;
            card.innerHTML = `
            <h2 class="text-xs font-bold mb-1">${item.day}</h2>
            <div class="space-y-1 text-xs">
                <div class="flex gap-1"><span>${Number(item.rate_per_mile).toFixed(2)}</span> <span>$/mile</span></div>
                <div class="flex gap-1"><span>${Number(item.miles).toLocaleString()}</span> <span>Miles</span></div>
                <div class="flex gap-1"><span>Cut</span> <span>$${Number(item.cut).toLocaleString()}</span></div>
                <div class="flex gap-1 border-t border-white/30 pt-2 mt-2 font-bold text-xs">
                    <span>Gross</span> <span>$${Number(item.gross).toLocaleString()}</span>
                </div>
            </div>
        `;

            container.appendChild(card);
        });
    }


    /* ============================
       INIT
    ============================ */
    updateTableData();
    loadWeeklyStatistics();
    setTimeout(autoScroll, pause);
    setInterval(updateTableData, 120000);
    setInterval(loadWeeklyStatistics, 120000);
</script>
{% endblock %}
