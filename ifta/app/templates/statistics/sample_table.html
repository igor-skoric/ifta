{% extends "base.html" %}

{% block content %}
<div class="h-screen w-screen bg-[#0F0F1A] flex flex-col overflow-hidden">

    <!-- ===================== -->
    <!-- DISPATCHER GRID (TOP) -->
    <!-- ===================== -->

    <div class="flex-1 px-3 py-2 flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between pb-2">
            <h1 class="text-xs font-semibold text-gray-300 tracking-wide uppercase">
                Dispatchers Overview
            </h1>
            <div class="text-xs text-gray-400">
                Total: <span id="dispatcherCount" class="text-gray-200 font-semibold">0</span>
            </div>
        </div>

        <!-- Compact Grid (fits ~40 on 1080p) -->
        <div id="dispatcherCards"
            class="flex-1 grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-6 xl:grid-cols-9 gap-2 overflow-hidden">
        </div>

    </div>

    <!-- ===================== -->
    <!-- WEEKLY CARDS (BOTTOM) -->
    <!-- ===================== -->

    <div id="weekly-container" class="flex gap-3 px-4 py-2 overflow-x-auto"></div>

</div>

<script>

    /* ============================
       HELPERS
    ============================ */

    function safeStr(v) {
        return (v === null || v === undefined) ? "" : String(v);
    }

    /* ============================
       DISPATCHER STATS
    ============================ */

    const DISPATCHER_API_URL = "/api/statistic/dispatchers/";
    const elCards = document.getElementById("dispatcherCards");
    const elCount = document.getElementById("dispatcherCount");

    async function loadDispatcherStats() {
        try {
            const res = await fetch(DISPATCHER_API_URL);
            const data = await res.json();

            const rows = Array.isArray(data) ? data : (data.data || []);
            elCount.textContent = rows.length;

            renderDispatcherCards(rows);

        } catch (e) {
            console.error("Dispatcher API error:", e);
            elCards.innerHTML = `
                <div class="col-span-full rounded-xl bg-red-500/10 ring-1 ring-red-500/20 p-4 text-red-200 text-sm">
                    Failed to load dispatcher stats.
                </div>
            `;
        }
    }

    
    function getRpmColorClass(rpmValue) {
        // prihvata: "2.05", "$2.05", "2,05", "2.05 rpm"...
        const s = String(rpmValue ?? "")
            .replace(",", ".")
            .replace(/[^0-9.\-]/g, "");
        const num = parseFloat(s);

        if (!Number.isFinite(num)) return "text-gray-400";
        if (num < 1.8) return "text-red-500";
        if (num <= 2.1) return "text-orange-400";
        return "text-green-400";
    }


    function renderDispatcherCards(rows) {
        if (!rows.length) {
            elCards.innerHTML = `
      <div class="col-span-full rounded-xl bg-white/5 ring-1 ring-white/10 p-6 text-gray-300 text-sm">
        No dispatchers found.
      </div>
    `;
            return;
        }

        elCards.innerHTML = "";

        rows.forEach((r) => {
            const dispatcher = safeStr(r.dispatcher);
            const gross = safeStr(r.gross);
            const cut = safeStr(r.cut);
            const miles = safeStr(r.miles);
            const rpm = safeStr(r.rpm);

            const rpmColor = getRpmColorClass(rpm);

            const card = document.createElement("div");
            card.className =
                "bg-gradient-to-br from-[#1E1E38] to-[#151528] rounded-xl p-3 text-gray-200 flex flex-col justify-between border border-white/10 shadow-lg";

            card.innerHTML = `
      <div class="text-[11px] text-gray-400 font-medium truncate mb-1">
        ${dispatcher}
      </div>

      <div class="flex items-baseline justify-between">
        <span class="text-sm font-bold text-gray-100 truncate">
          ${gross}
        </span>
        <span class="text-xl font-semibold ${rpmColor}">
          ${rpm}
        </span>
      </div>

      <div class="h-px bg-white/10 my-2"></div>

      <div class="grid grid-cols-2 gap-2 text-center">
        <div class="flex flex-col">
          <span class="text-[9px] text-gray-500 uppercase tracking-wide">Magic</span>
          <span class="text-sm font-semibold text-gray-100 truncate">
            ${cut}
          </span>
        </div>

        <div class="flex flex-col">
          <span class="text-[9px] text-gray-500 uppercase tracking-wide">Miles</span>
          <span class="text-sm font-semibold text-gray-100 truncate">
            ${miles}
          </span>
        </div>
      </div>
    `;

            elCards.appendChild(card);
        });
    }

    /* ============================
       WEEKLY CARDS
    ============================ */

    const DAY_ORDER = { Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6, Sun: 7, TOTALS: 99 };

    async function loadWeeklyStatistics() {
        const res = await fetch('/api/statistic/weekly-statistic/');
        const data = await res.json();

        data.sort((a, b) => DAY_ORDER[a.day] - DAY_ORDER[b.day]);

        const container = document.getElementById('weekly-container');
        container.innerHTML = '';

        data.forEach(item => {
            const totals = item.day === 'TOTALS';
            const cardBg = totals ? '#5B7CFA' : '#330A56';

            const card = document.createElement('div');
            card.style.backgroundColor = cardBg;
            card.className = `rounded-lg p-2 text-white shadow-lg flex flex-col`;

            card.innerHTML = `
                <h2 class="text-xs font-bold mb-1">${item.day}</h2>
                <div class="space-y-1 text-xs">
                    <div>${Number(item.rate_per_mile).toFixed(2)} $/mile</div>
                    <div>${Number(item.miles).toLocaleString()} Miles</div>
                    <div>Cut $${Number(item.cut).toLocaleString()}</div>
                    <div class="border-t border-white/30 pt-1 mt-1 font-bold">
                        Gross $${Number(item.gross).toLocaleString()}
                    </div>
                </div>
            `;

            container.appendChild(card);
        });
    }

    /* ============================
       INIT
    ============================ */

    loadDispatcherStats();
    loadWeeklyStatistics();

    setInterval(loadDispatcherStats, 120000);
    setInterval(loadWeeklyStatistics, 120000);

</script>
{% endblock %}
