{% extends "base.html" %}
{% block content %}

<style>
  /* 1) samo dispatchers seats */
  #dispatchers g[id^="seat_DSP_"] {
    cursor: pointer;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 140ms ease, filter 140ms ease;
  }

  /* 2) hover state (JS dodaje .is-hover na seat) */
  #dispatchers g[id^="seat_DSP_"].is-hover {
    transform: scale(1.08);
  }

  /* 3) hitbox: nek bude nevidljiv, ali da hvata pointer */
  #dispatchers g[id^="seat_DSP_"] .hitbox,
  #dispatchers g[id^="seat_DSP_"] rect[id*="hitbox"],
  #dispatchers g[id^="seat_DSP_"] rect[name*="hitbox"] {
    fill: rgba(0, 0, 0, 0);
    /* potpuno nevidljivo */
    stroke: none;
    pointer-events: all;
    /* bitno */
  }

  /* 4) opcionalno: malo promeni boju ikonice na hover */
  #dispatchers g[id^="seat_DSP_"].is-hover path {
    fill: #6f087c;
  }

  /* 5) tooltip (ako ga koristiš) */
  .seat-tooltip {
    position: fixed;
    z-index: 9999;
    padding: 6px 10px;
    font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: rgba(20, 20, 20, 0.92);
    color: #fff;
    border-radius: 8px;
    pointer-events: none;
    transform: translate(10px, 12px);
    white-space: nowrap;
  }
</style>

<script>
  // 1) Helper: napravi listu seat ID-jeva (37 komada)
  function buildSeatIds37() {
    const ids = [];
    for (let r = 1; r <= 6; r++) {
      for (let c = 1; c <= 6; c++) {
        ids.push(`seat_DSP_${String(r).padStart(2, '0')}_${String(c).padStart(2, '0')}`);
      }
    }
    ids.push("seat_DSP_07_01"); // 37-ti
    return ids.slice(0, 37);
  }

  // 2) Dispatcher model (osnovno + jos par polja)
  function makeDispatcher(i, seatId) {
    const num = String(i).padStart(2, "0");
    return {
      seatId,
      firstName: `Dispatcher${num}`,
      lastName: `User${num}`,
      email: `dispatcher${num}@company.com`,
      contact: `+1 (555) 010-${String(100 + i).slice(-3)}`,
      pcSerialNo: `SN-DSP-${num}-${1000 + i}`,
      pcId: `PC-DSP-${num}`,
      department: "Dispatch",
      shift: i % 2 === 0 ? "Day" : "Night",
      teamLead: i % 6 === 0 ? "Lucas" : (i % 5 === 0 ? "Andy" : "—"),
      notes: i % 7 === 0 ? "Training" : ""
    };
  }

  // 3) Map seatId -> dispatcher
  const DISPATCH_SEATS = buildSeatIds37();

  console.log(DISPATCH_SEATS)
  const dispatchersBySeat = Object.fromEntries(
    DISPATCH_SEATS.map((seatId, idx) => {
      const d = makeDispatcher(idx + 1, seatId);
      return [seatId, d];
    })
  );

  function initDispatcherSeatHover() {
    const root = document.getElementById("dispatchers");
    if (!root) {
      console.warn("dispatchers group not found in SVG");
      return;
    }

    // Tooltip element
    const tooltip = document.createElement("div");
    tooltip.className = "seat-tooltip";
    tooltip.style.display = "none";
    document.body.appendChild(tooltip);

    let activeSeat = null;

    function renderTooltip(dispatcher, seatId) {
      if (!dispatcher) {
        tooltip.innerHTML = `
          <div class="title">${seatId}</div>
          <div style="opacity:.8">Nema podataka za ovaj seat.</div>
        `;
        return;
      }
      tooltip.innerHTML = `
  <div class="w-80 rounded-xl bg-zinc-900/95 text-zinc-100 shadow-2xl ring-1 ring-white/10 backdrop-blur">
    
    <!-- Header -->
    <div class="px-4 pt-4 pb-3 border-b border-white/10">
      <div class="text-sm font-semibold tracking-wide">
        ${dispatcher.firstName} ${dispatcher.lastName}
      </div>
      <div class="mt-1 flex flex-wrap gap-2">
        <span class="inline-flex items-center rounded-md bg-indigo-500/15 px-2 py-0.5 text-[11px] font-medium text-indigo-300">
          ${dispatcher.seatId}
        </span>
        <span class="inline-flex items-center rounded-md bg-emerald-500/15 px-2 py-0.5 text-[11px] font-medium text-emerald-300">
          ${dispatcher.shift} shift
        </span>
        ${dispatcher.teamLead && dispatcher.teamLead !== "—"
          ? `<span class="inline-flex items-center rounded-md bg-amber-500/15 px-2 py-0.5 text-[11px] font-medium text-amber-300">
               Lead: ${dispatcher.teamLead}
             </span>`
          : ``}
      </div>
    </div>

    <!-- Body -->
    <div class="px-4 py-3 space-y-2 text-xs">
      <div class="flex justify-between gap-4">
        <span class="text-zinc-400">Email</span>
        <span class="font-medium text-zinc-100 truncate">${dispatcher.email}</span>
      </div>

      <div class="flex justify-between gap-4">
        <span class="text-zinc-400">Contact</span>
        <span class="font-medium text-zinc-100">${dispatcher.contact}</span>
      </div>

      <div class="flex justify-between gap-4">
        <span class="text-zinc-400">PC Serial</span>
        <span class="font-medium text-zinc-100">${dispatcher.pcSerialNo}</span>
      </div>

      <div class="flex justify-between gap-4">
        <span class="text-zinc-400">PC ID</span>
        <span class="font-medium text-zinc-100">${dispatcher.pcId}</span>
      </div>

      ${dispatcher.notes
          ? `<div class="mt-3 rounded-lg bg-zinc-800/70 px-3 py-2 text-[11px] text-zinc-300 ring-1 ring-white/5">
               <span class="block font-medium text-zinc-200 mb-0.5">Notes</span>
               ${dispatcher.notes}
             </div>`
          : ``
        }
    </div>
  </div>
`;

    }

    function setActive(seatEl) {
      if (activeSeat === seatEl) return;

      if (activeSeat) activeSeat.classList.remove("is-hover");
      activeSeat = seatEl;

      if (!activeSeat) {
        tooltip.style.display = "none";
        return;
      }

      activeSeat.classList.add("is-hover");

      const seatId = activeSeat.id;
      const dispatcher = dispatchersBySeat[seatId];

      renderTooltip(dispatcher, seatId);
      tooltip.style.display = "block";
    }

    function moveTooltip(e) {
      if (tooltip.style.display === "none") return;

      // mali offset + clamp (da ne izadje van ekrana)
      const pad = 12;
      const maxX = window.innerWidth - tooltip.offsetWidth - pad;
      const maxY = window.innerHeight - tooltip.offsetHeight - pad;

      const x = Math.min(e.clientX, maxX);
      const y = Math.min(e.clientY, maxY);

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    // Event delegation (stabilno i brzo)
    root.addEventListener("pointermove", (e) => {
      const seat = e.target.closest?.('g[id^="seat_DSP_"]') || null;
      setActive(seat);
      moveTooltip(e);
    });

    root.addEventListener("pointerleave", () => {
      setActive(null);
    });

    // Klik (opciono)
    // Klik: otvori sidebar
    root.addEventListener("click", (e) => {
      const seat = e.target.closest?.('g[id^="seat_DSP_"]') || null;
      if (!seat) return;

      const seatId = seat.id;
      const dispatcher = dispatchersBySeat[seatId];

      openSidebar(dispatcher, seatId);
    });

    console.log(`Dispatcher hover ready. Seats in SVG: ${root.querySelectorAll('g[id^="seat_DSP_"]').length}`);
    console.log(`Dispatchers in data: ${Object.keys(dispatchersBySeat).length}`);
  }
  
  function ensureSidebar() {
    let overlay = document.getElementById("empOverlay");
    let sidebar = document.getElementById("empSidebar");

    if (overlay && sidebar) return { overlay, sidebar };

    overlay = document.createElement("div");
    overlay.id = "empOverlay";
    overlay.className =
      "fixed inset-0 z-[9998] hidden bg-black/40 backdrop-blur-sm";

    sidebar = document.createElement("aside");
    sidebar.id = "empSidebar";
    sidebar.className =
      "fixed right-0 top-0 z-[9999] h-full w-[420px] max-w-[92vw] translate-x-full bg-white shadow-2xl transition-transform duration-200 ease-out";

    sidebar.innerHTML = `
    <div class="flex h-full flex-col">
      <div class="flex items-start justify-between gap-3 border-b px-5 py-4">
        <div>
          <div id="sbName" class="text-lg font-semibold text-zinc-900">Employee</div>
          <div id="sbSeat" class="mt-1 inline-flex items-center rounded-md bg-indigo-50 px-2 py-0.5 text-xs font-medium text-indigo-700">
            seat
          </div>
        </div>
        <button id="sbClose" class="rounded-lg p-2 text-zinc-500 hover:bg-zinc-100 hover:text-zinc-800" aria-label="Close">
          ✕
        </button>
      </div>

      <div class="flex-1 overflow-auto px-5 py-4">
        <div class="grid grid-cols-1 gap-3">
          <div class="rounded-xl border bg-zinc-50 p-4">
            <div class="text-xs font-semibold text-zinc-700">Kontakt</div>
            <div class="mt-2 space-y-2 text-sm">
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Email</span>
                <span id="sbEmail" class="font-medium text-zinc-900 truncate"></span>
              </div>
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Phone</span>
                <span id="sbPhone" class="font-medium text-zinc-900"></span>
              </div>
            </div>
          </div>

          <div class="rounded-xl border bg-white p-4">
            <div class="text-xs font-semibold text-zinc-700">Oprema</div>
            <div class="mt-2 space-y-2 text-sm">
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">PC ID</span>
                <span id="sbPcId" class="font-medium text-zinc-900"></span>
              </div>
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Serial No</span>
                <span id="sbSerial" class="font-medium text-zinc-900"></span>
              </div>
            </div>
          </div>

          <div class="rounded-xl border bg-white p-4">
            <div class="text-xs font-semibold text-zinc-700">Posao</div>
            <div class="mt-2 space-y-2 text-sm">
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Department</span>
                <span id="sbDept" class="font-medium text-zinc-900"></span>
              </div>
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Shift</span>
                <span id="sbShift" class="font-medium text-zinc-900"></span>
              </div>
              <div class="flex justify-between gap-4">
                <span class="text-zinc-500">Team Lead</span>
                <span id="sbLead" class="font-medium text-zinc-900"></span>
              </div>
            </div>
          </div>

          <div id="sbNotesWrap" class="hidden rounded-xl border bg-amber-50 p-4">
            <div class="text-xs font-semibold text-amber-800">Notes</div>
            <div id="sbNotes" class="mt-2 text-sm text-amber-900"></div>
          </div>

          <!-- ovde možeš dodati još sekcija (address, emergency contact, etc) -->
        </div>
      </div>
    </div>
  `;

    document.body.appendChild(overlay);
    document.body.appendChild(sidebar);

    // close handlers
    overlay.addEventListener("click", closeSidebar);
    sidebar.querySelector("#sbClose").addEventListener("click", closeSidebar);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSidebar();
    });

    function closeSidebar() {
      overlay.classList.add("hidden");
      sidebar.classList.add("translate-x-full");
    }

    // expose close function globally inside this closure via dataset
    sidebar.dataset.closeFnBound = "1";
    window.__closeEmpSidebar = closeSidebar;

    return { overlay, sidebar };
  }

  function openSidebar(dispatcher, seatId) {
    const { overlay, sidebar } = ensureSidebar();

    // fallback ako nema podataka
    const d = dispatcher || {
      firstName: "Unknown",
      lastName: "",
      email: "—",
      contact: "—",
      pcId: "—",
      pcSerialNo: "—",
      department: "Dispatch",
      shift: "—",
      teamLead: "—",
      notes: ""
    };

    sidebar.querySelector("#sbName").textContent = `${d.firstName} ${d.lastName}`.trim();
    sidebar.querySelector("#sbSeat").textContent = seatId;

    sidebar.querySelector("#sbEmail").textContent = d.email || "—";
    sidebar.querySelector("#sbPhone").textContent = d.contact || "—";

    sidebar.querySelector("#sbPcId").textContent = d.pcId || "—";
    sidebar.querySelector("#sbSerial").textContent = d.pcSerialNo || "—";

    sidebar.querySelector("#sbDept").textContent = d.department || "Dispatch";
    sidebar.querySelector("#sbShift").textContent = d.shift || "—";
    sidebar.querySelector("#sbLead").textContent = d.teamLead || "—";

    const notesWrap = sidebar.querySelector("#sbNotesWrap");
    const notesEl = sidebar.querySelector("#sbNotes");
    if (d.notes) {
      notesEl.textContent = d.notes;
      notesWrap.classList.remove("hidden");
    } else {
      notesWrap.classList.add("hidden");
    }

    // show
    overlay.classList.remove("hidden");
    // mali trick da tranzicija uvek radi
    requestAnimationFrame(() => sidebar.classList.remove("translate-x-full"));
  }


  document.addEventListener("DOMContentLoaded", initDispatcherSeatHover);
</script>
